<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kings In The Corner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="./images/icon-512.png">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body data-theme="green-felt">
        
    <div id="setup-screen" class="modal">
        <div class="modal-content">
            <h2>Kings in the Corner</h2>
            
            <div class="form-group">
                <label for="player-count">Number of Players:</label>
                <select id="player-count" class="input-control">
                    <option value="2">2 Players</option>
                    <option value="3">3 Players</option>
                    <option value="4" selected>4 Players</option>
                </select>
            </div>

            <div class="form-group">
                <label for="game-mode">Game Mode:</label>
                <select id="game-mode" class="input-control">
                    <option value="casual">Casual</option>
                    <option value="tournament">Tournament (Scored)</option>
                </select>
            </div>

            <div id="tournament-limit-group" class="form-group hidden">
                <label for="tournament-limit">Tournament Point Limit:</label>
                <select id="tournament-limit" class="input-control">
                    <option value="50">50 Points (Quick Game)</option>
                    <option value="100" selected>100 Points (Standard)</option>
                    <option value="150">150 Points (Long Game)</option>
                    <option value="200">200 Points (Marathon)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="theme-select">Table Theme:</label>
                <select id="theme-select" class="input-control">
                    <option value="green-felt">Classic Green Felt</option>
                    <option value="dark-wood">Dark Wood Table</option>
                    <option value="midnight-slate">Midnight Slate</option>
                </select>
            </div>
            
            <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" id="enable-undo" checked> Enable Undo Button
                </label>
            </div>

            <div id="name-inputs-container">
            </div>

            <button id="start-game-btn" class="btn primary">Start Game</button>
        </div>
    </div>
    
    <div id="hold-screen" class="modal hidden">
        <div class="modal-content">
            <h2 id="next-player-notice">Player's Turn</h2>
            <p id="pass-device-notice">Pass the device to the next player.</p>
            <button id="start-turn-btn" class="btn primary">Ready?</button>
        </div>
    </div>

    <div id="win-screen" class="modal hidden">
        <div class="modal-content win-content">
            <h1 id="winner-display">Player 1 Wins!</h1>
            <p>👑 Kings in the Corner Champion! 👑</p>
            
            <div class="win-actions">
                <button id="play-again-btn" class="btn primary">Play Again (Same Players)</button>
                <button id="new-setup-btn" class="btn">Change Players / Main Menu</button>
            </div>
        </div>
    </div>
    
    <div id="game-container" class="game-viewport hidden">
        <header class="game-header">
            <div class="header-left">
                <h1 id="current-player-display" class="player-title">Player 1</h1>
            </div>
            <div class="header-actions">
                <button id="undo-btn" class="btn btn-undo hidden">Undo</button>
                <button id="end-turn-btn" class="btn btn-end">End Turn</button>
                <button id="quit-btn" class="btn btn-quit" style="background: #ef5350; color: white;">Quit</button>
            </div>
        </header>

        <div class="deck-status-bar">
            <span>Draw Pile: <strong id="deck-count">0</strong></span>
        </div>

        <main class="board-grid">
            <div class="pile corner" data-pile="nw" id="pile-nw"><span class="pile-label">K</span></div>
            <div class="pile standard" data-pile="north" id="pile-north"></div>
            <div class="pile corner" data-pile="ne" id="pile-ne"><span class="pile-label">K</span></div>
            
            <div class="pile standard" data-pile="west" id="pile-west"></div>
            <div class="center-deck" id="center-deck">
                <div class="card back deck-card"></div>
            </div>
            <div class="pile standard" data-pile="east" id="pile-east"></div>
            
            <div class="pile corner" data-pile="sw" id="pile-sw"><span class="pile-label">K</span></div>
            <div class="pile standard" data-pile="south" id="pile-south"></div>
            <div class="pile corner" data-pile="se" id="pile-se"><span class="pile-label">K</span></div>
        </main>

        <footer class="hand-container">
            <div id="player-hand" class="hand"></div>
        </footer>
    </div>

    <div id="drag-ghost" class="card hidden"></div>

    <script src="app.js"></script>
</body>
</html>
